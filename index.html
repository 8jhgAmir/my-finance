<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Seyednourani | Strategic Advisor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #060d1a; overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
        }
        .logo { color: #c5a059; font-weight: bold; letter-spacing: 2px; }

        /* بخش‌های ۷ صفحه - فقط نمایش عکس‌های حرفه‌ای شما */
        section { 
            height: 100vh; width: 100%; position: relative; 
            background-size: cover; background-position: center; 
            display: flex; align-items: flex-end; padding: 60px 10%; 
            border-bottom: 1px solid rgba(197,160,89,0.1);
        }

        /* دکمه‌های شیشه‌ای که روی متن عکس نمی‌افتند */
        .btn-action { 
            background: rgba(197, 160, 89, 0.1); color: #c5a059; 
            padding: 12px 35px; text-decoration: none; border: 1px solid #c5a059; 
            font-weight: bold; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-action:hover { background: #c5a059; color: #060d1a; }

        /* فراخوانی مستقیم و دقیق عکس‌ها بر اساس فایل‌های شما */
        #p1 { background-image: url('hero-me.jpg'); }
        #p2 { background-image: url('wisdom.jpg'); }
        #p3 { background-image: url('protection.jpg'); }
        #p4 { background-image: url('future.jpg'); }
        #p5 { background: #0a192f; align-items: center; justify-content: center; } /* بخش شبکه */
        #p6 { background-image: url('legacy.jpg'); }
        #p7 { background-image: url('contact-bg.jpg'); justify-content: center; }

        .net-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 20px; width: 100%; max-width: 800px; text-align: center; }
        .net-item { color: #c5a059; text-decoration: none; border: 1px solid rgba(197,160,89,0.3); padding: 25px; transition: 0.3s; }
        .net-item i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">M. SEYEDNOURANI</div>
        <div style="color:#c5a059; cursor:pointer; font-size:0.8rem; border:1px solid; padding:2px 8px;">FA/EN</div>
    </header>

    <section id="p1"><a href="https://wa.me/98912XXXXXXX" class="btn-action">START STRATEGY</a></section>
    <section id="p2"></section>
    <section id="p3"></section>
    <section id="p4"></section>
    
    <section id="p5">
        <div class="net-grid">
            <a href="https://wa.me/98912XXXXXXX" class="net-item"><i class="fab fa-whatsapp"></i>WhatsApp</a>
            <a href="tel:+98912XXXXXXX" class="net-item"><i class="fas fa-phone"></i>Direct Call</a>
            <a href="mailto:info@seyednourani.com" class="net-item"><i class="far fa-envelope"></i>Email</a>
        </div>
    </section>

    <section id="p6"></section>
    <section id="p7"><a href="mailto:info@seyednourani.com" class="btn-action">START LEGACY</a></section>

</body>
</html>
