
  <!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Seyednourani | Strategic Legacy Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');
        :root { --gold: #c5a059; --navy: #060d1a; --glass: rgba(255, 255, 255, 0.03); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Vazirmatn', sans-serif; background: var(--navy); color: white; overflow-x: hidden; }

        /* هدر فوق‌العاده مینیمال */
        header { 
            position: fixed; top: 0; width: 100%; padding: 25px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(6, 13, 26, 0.2); backdrop-filter: blur(10px);
        }
        .logo { color: var(--gold); font-weight: 700; letter-spacing: 4px; font-size: 1rem; text-transform: uppercase; }

        /* ساختار صفحات متحرک */
        section { 
            height: 100vh; width: 100%; position: relative; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            background-attachment: fixed;
            transition: transform 2.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
        }
        /* افکت زوم ملایم هنگام ورود به صفحه */
        .active .bg-img { transform: scale(1.1); }

        /* لایه تاریک‌کننده هوشمند */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 2; }

        /* دکمه نامرئی روی دکمه‌های خود عکس */
        .click-layer {
            position: absolute; z-index: 100;
            width: 280px; height: 90px;
            bottom: 14%; /* تنظیم دقیق روی دکمه عکس اول */
            cursor: pointer;
            background: rgba(255,255,255,0);
        }

        /* آدرس عکس‌ها */
        #p1 .bg-img { background-image: url('hero-me.jpg'); }
        #p2 .bg-img { background-image: url('wisdom.jpg'); }
        #p3 .bg-img { background-image: url('protection.jpg'); }
        #p4 .bg-img { background-image: url('future.jpg'); }
        #p5 { background: radial-gradient(circle at center, #0a192f 0%, #060d1a 100%); z-index: 10; }
        #p6 .bg-img { background-image: url('legacy.jpg'); }
        #p7 .bg-img { background-image: url('contact-bg.jpg'); }

        /* استایل صفحه ۵ (Strategic Hub) */
        .strategic-hub {
            position: relative; z-index: 20; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
        }
        .hub-title h2 { color: var(--gold); font-weight: 100; letter-spacing: 6px; margin-bottom: 50px; border-bottom: 1px solid rgba(197,160,89,0.2); padding-bottom: 10px; }
        
        .connection-line { display: flex; justify-content: space-around; width: 100%; gap: 20px; }
        .node { 
            text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; 
            transition: 0.5s; position: relative; padding: 20px;
        }
        .node i { font-size: 2.5rem; color: rgba(197,160,89,0.4); margin-bottom: 15px; transition: 0.5s; }
        .node span { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: #8892b0; }
        .node:hover i { color: var(--gold); transform: scale(1.2); text-shadow: 0 0 20px var(--gold); }
        .node::after { content: ''; position: absolute; bottom: 0; width: 0; height: 1px; background: var(--gold); transition: 0.5s; box-shadow: 0 0 10px var(--gold); }
        .node:hover::after { width: 100%; }

        /* استایل صفحه ۶ (Legacy Box) */
        .legacy-box {
            position: relative; z-index: 10; background: rgba(197, 160, 89, 0.05);
            backdrop-filter: blur(15px); padding: 40px; border-right: 3px solid var(--gold);
            max-width: 500px; text-align: right; margin-right: 40%;
        }
    </style>
</head>
<body>

    <header><div class="logo">M. SEYEDNOURANI</div></header>

    <section id="p1">
        <div class="bg-img"></div><div class="overlay"></div>
        <a href="#p2" class="click-layer"></a>
    </section>

    <section id="p2"><div class="bg-img"></div><div class="overlay"></div></section>
    <section id="p3"><div class="bg-img"></div><div class="overlay"></div></section>
    <section id="p4"><div class="bg-img"></div><div class="overlay"></div></section>

    <section id="p5">
        <div class="strategic-hub">
            <div class="hub-title"><h2>COMMUNICATION HUB</h2></div>
            <div class="connection-line">
                <a href="https://wa.me/14169490179" class="node"><i class="fab fa-whatsapp"></i><span>Secure Link</span></a>
                <a href="tel:+14169490179" class="node"><i class="fas fa-satellite-dish"></i><span>Direct Intel</span></a>
                <a href="mailto:amirsn121@gmail.com" class="node"><i class="far fa-envelope-open"></i><span>Private Portal</span></a>
            </div>
            <div style="margin-top: 60px; text-align: center; border-left: 1px solid var(--gold); padding-left: 20px; max-width: 500px;">
                <p style="font-style: italic; color: #8892b0; line-height: 1.8;">
                    "ثروت، محصولِ قدرتِ تفکر و دقتِ استراتژی است؛ نه صرفاً تلاشِ فیزیکی."
                </p>
            </div>
        </div>
    </section>

    <section id="p6">
        <div class="bg-img"></div><div class="overlay"></div>
        <div class="legacy-box">
            <h2 style="color: var(--gold); font-size: 2rem; margin-bottom: 10px;">THE LEGACY</h2>
            <p style="font-weight: 100; line-height: 1.6; color: #ccd6f6;">ساختن میراثی که فراتر از زمان حرکت کند.<br>Architecting a future that endures.</p>
        </div>
    </section>

    <section id="p7">
        <div class="bg-img"></div><div class="overlay"></div>
        <a href="mailto:amirsn121@gmail.com" class="click-layer" style="bottom: 20%; width: 320px;"></a>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
                else entry.target.classList.remove('active');
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
