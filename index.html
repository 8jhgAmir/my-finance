
    <!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');
        :root { --gold: #c5a059; --navy: #060d1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Vazirmatn', sans-serif; background: var(--navy); color: white; overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; padding: 25px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(6, 13, 26, 0.5); backdrop-filter: blur(15px);
        }
        .logo { color: var(--gold); font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; }

        section { 
            height: 100vh; width: 100%; position: relative; 
            background-size: cover; background-position: center; 
            background-attachment: fixed; /* افکت متحرک پارالاکس */
            display: flex; align-items: center; justify-content: center;
        }
        section::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(6,13,26,0.3), rgba(6,13,26,0.8)); 
        }

        .v-content { position: relative; z-index: 10; text-align: center; opacity: 0; transform: translateY(30px); transition: 1.5s all ease; }
        .active .v-content { opacity: 1; transform: translateY(0); }

        .btn-v { 
            display: inline-block; padding: 18px 50px; border: 2px solid var(--gold); 
            color: var(--gold); text-decoration: none; font-weight: bold; 
            transition: 0.5s; background: rgba(197,160,89,0.05); cursor: pointer;
            letter-spacing: 2px;
        }
        .btn-v:hover { background: var(--gold); color: var(--navy); box-shadow: 0 0 40px rgba(197,160,89,0.5); transform: scale(1.05); }

        /* آدرس دقیق فایل‌ها طبق مخزن شما */
        #p1 { background-image: url('hero-me.jpg'); }
        #p2 { background-image: url('wisdom.jpg'); }
        #p3 { background-image: url('protection.jpg'); }
        #p4 { background-image: url('future.jpg'); }
        #p6 { background-image: url('legacy.jpg'); }
        #p7 { background-image: url('contact-bg.jpg'); }

        .grid-hub { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; width: 90%; max-width: 1000px; margin-top: 40px; }
        .card-hub { 
            padding: 40px 20px; border: 1px solid rgba(197,160,89,0.1); 
            background: rgba(255,255,255,0.02); text-decoration: none; 
            color: white; transition: 0.4s; backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center;
        }
        .hub-card:hover { border-color: var(--gold); transform: translateY(-10px); background: rgba(197,160,89,0.05); }
        .card-hub i { font-size: 3rem; color: var(--gold); margin-bottom: 20px; display: block; transition: 0.5s; }
        .card-hub:hover i { transform: rotateY(360deg); }
    </style>
</head>
<body>

            </p>
            <div class="grid-hub">
                <a href="https://wa.me/14169490179" class="card-hub">
                    <i class="fab fa-whatsapp"></i>
                    <strong>WhatsApp</strong><br><small style="color:#5d6880;">+1 416 949 0179</small>
                </a>
                <a href="tel:+14169490179" class="card-hub">
                    <i class="fas fa-phone-alt"></i>
                    <strong>Direct Call</strong><br><small style="color:#5d6880;">تماس مستقیم</small>
                </a>
                <a href="mailto:amirsn121@gmail.com" class="card-hub">
                    <i class="far fa-envelope"></i>
                    <strong>Email Hub</strong><br><small style="color:#5d6880;">amirsn121@gmail.com</small>
                </a>

    <section id="p7">

        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.3 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
